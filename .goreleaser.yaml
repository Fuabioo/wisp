# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# GoReleaser configuration for Wisp
# Documentation: https://goreleaser.com/customization/

version: 2

project_name: wisp

before:
  hooks:
    - go mod tidy

builds:
  - id: wisp
    main: .
    binary: wisp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Fuabioo/wisp/cmd.Version={{ .Version }}
      - -X github.com/Fuabioo/wisp/cmd.CommitSHA={{ .ShortCommit }}
      - -X github.com/Fuabioo/wisp/cmd.BuildDate={{ .Date }}

  - id: wisp-desktop
    builder: rust
    dir: gui
    binary: wisp-desktop
    command: zigbuild
    flags:
      - --release
      - --package=wisp-desktop
    targets:
      - x86_64-unknown-linux-gnu
    # aarch64 requires cross-compilation sysroots with wayland/xkbcommon
    # - aarch64-unknown-linux-gnu

archives:
  - id: wisp
    ids:
      - wisp
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- .Arch }}
    files:
      - README.md

  - id: wisp-desktop
    ids:
      - wisp-desktop
    formats: [tar.gz]
    name_template: >-
      wisp-desktop_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md
      - gui/data/desktop/*.desktop
      - assets/logo-wisp.svg

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Refactoring
      regexp: '^.*?refactor(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: Other
      order: 999

release:
  github:
    owner: Fuabioo
    name: wisp
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  header: |
    ## Wisp {{ .Version }}

    A lightweight daemon for spawning and sharing PTY-backed terminal sessions over SSH.
  footer: |
    ---

    **Full Changelog**: https://github.com/Fuabioo/wisp/compare/{{ .PreviousTag }}...{{ .Tag }}

    ### Installation

    **Homebrew (recommended for Linux/macOS):**
    ```bash
    brew tap Fuabioo/homebrew-tap
    brew install wisp wisp-desktop

    # Start the daemon (auto-starts on login)
    brew services start wisp
    ```

    **Binary downloads:**
    Download the archive for your platform from the assets below, extract, and run:
    ```bash
    # CLI daemon
    tar xzf wisp_*.tar.gz
    ./wisp daemon &

    # COSMIC desktop GUI (requires Wayland + libcosmic deps)
    tar xzf wisp-desktop_*.tar.gz
    ./wisp-desktop
    ```

    **From source:**
    ```bash
    go install github.com/Fuabioo/wisp@{{ .Tag }}
    wisp daemon &
    ```

brews:
  - name: wisp
    ids:
      - wisp
    repository:
      owner: Fuabioo
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    goamd64: v1
    url_template: "https://github.com/Fuabioo/wisp/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    directory: Formula
    homepage: "https://github.com/Fuabioo/wisp"
    description: "Lightweight daemon for spawning and sharing PTY-backed terminal sessions over SSH"
    license: "MIT"
    skip_upload: auto
    install: |
      bin.install "wisp"
    post_install: |
      # Install user-level systemd service
      mkdir_p etc/"systemd/user"
      systemd_service = etc/"systemd/user/wisp.service"
      systemd_service.write <<~EOS
        [Unit]
        Description=Wisp Terminal Daemon
        After=network.target

        [Service]
        Type=simple
        ExecStart=#{opt_bin}/wisp daemon
        Restart=on-failure

        [Install]
        WantedBy=default.target
      EOS
    service: |
      run [opt_bin/"wisp", "daemon"]
      keep_alive true
      run_type :immediate
      environment_variables PATH: std_service_path_env
      log_path var/"log/wisp.log"
      error_log_path var/"log/wisp.log"
    caveats: |
      To start the daemon now and on login:
        brew services start wisp

      To start a shared terminal session:
        wisp server --port 8082

      To connect to the session:
        ssh -p 8082 localhost

  - name: wisp-desktop
    ids:
      - wisp-desktop
    repository:
      owner: Fuabioo
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    goamd64: v1
    url_template: "https://github.com/Fuabioo/wisp/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    directory: Formula
    homepage: "https://github.com/Fuabioo/wisp"
    description: "COSMIC-native desktop GUI for the wisp terminal daemon"
    license: "MIT"
    skip_upload: auto
    install: |
      bin.install "wisp-desktop"
      (share/"icons/hicolor/scalable/apps").install "assets/logo-wisp.svg" => "dev.fabiomora.WispAdmin.svg"
    post_install: |
      # Write desktop entry with correct PATH so wisp-desktop can find `wisp`
      desktop = share/"applications/dev.fabiomora.WispAdmin.desktop"
      desktop.write <<~DESKTOP
        [Desktop Entry]
        Name=Wisp Desktop
        GenericName=Shared Terminal Manager
        Comment=Manage wisp PTY sessions and attached peers
        Exec=env PATH=#{HOMEBREW_PREFIX}/bin:#{ENV["PATH"]} wisp-desktop
        Icon=dev.fabiomora.WispAdmin
        Type=Application
        Terminal=false
        Categories=Utility;System;TerminalEmulator;
        Keywords=wisp;ssh;pty;terminal;session;
        StartupNotify=true
        StartupWMClass=dev.fabiomora.WispAdmin
      DESKTOP

      user_apps = File.expand_path("~/.local/share/applications")
      user_icons = File.expand_path("~/.local/share/icons/hicolor/scalable/apps")
      mkdir_p user_apps
      mkdir_p user_icons
      ln_sf desktop, "#{user_apps}/dev.fabiomora.WispAdmin.desktop"
      ln_sf share/"icons/hicolor/scalable/apps/dev.fabiomora.WispAdmin.svg", "#{user_icons}/dev.fabiomora.WispAdmin.svg"
      system "gtk-update-icon-cache", "-f", "-t", File.expand_path("~/.local/share/icons/hicolor") if File.exist?("/usr/bin/gtk-update-icon-cache")
    caveats: |
      Wisp Desktop is a COSMIC-native desktop app.

      To launch:
        wisp-desktop

      Requires the wisp daemon to be running:
        brew services start wisp
